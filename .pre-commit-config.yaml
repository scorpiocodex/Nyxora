# Pre-commit hooks for Nyxora (Sentinel #11).
#
# Gitleaks scans staged changes and blocks a commit that would introduce a real
# secret, using the repo's .gitleaks.toml allowlist (synthetic test fixtures are
# ignored; real credentials are caught).
#
# Local use requires the pre-commit framework and gitleaks on PATH:
#   pip install pre-commit
#   pre-commit install
# On Windows, install gitleaks (e.g. `choco install gitleaks` or the release
# binary) so the hook can find it.

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        name: Detect hardcoded secrets (gitleaks)
        entry: gitleaks protect --staged --redact --config .gitleaks.toml
        pass_filenames: false
