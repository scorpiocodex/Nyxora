name: Secret Scanning

# Gitleaks secret detection (Sentinel #11). Guards against committing a real
# credential, key, or vault into this password-manager repo. Uses the direct
# gitleaks binary (license-free; not gitleaks-action) pinned + checksum-verified.
#
# This job is intentionally NOT yet a required check — it is made required via
# branch protection after merge, once it has run clean on main.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GITLEAKS_VERSION: "8.30.1"
  GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned (v5.0.1). Full history so the scan covers every commit.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          set -euo pipefail
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}"
          curl -sSL -o "$tarball" "$url"
          echo "${GITLEAKS_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "$tarball" gitleaks
          chmod +x gitleaks
          ./gitleaks version

      - name: Scan git history for secrets
        run: |
          set -euo pipefail
          ./gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --exit-code 1
