name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-latest redirects to windows-2025-vs2026 from June 15, 2026
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Lint and type findings are reported but non-blocking until the
      # full cleanup pass (tracked for v3.0.1); pytest is the gate.
      - name: Run ruff lint
        run: ruff check src/ tests/
        continue-on-error: true

      - name: Run mypy type check
        run: mypy src/nyxora
        continue-on-error: true

      - name: Run tests
        run: pytest tests/ -x -q --timeout=60
