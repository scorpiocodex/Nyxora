name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Least-privilege default: the test matrix only checks out and runs the suite.
permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-latest redirects to windows-2025-vs2026 from June 15, 2026
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Lint and type gates restored to blocking in #2 (v3.1.0 Sentinel)
      # after clearing the pre-existing ruff + mypy findings.
      - name: Run ruff lint
        run: ruff check src/ tests/

      - name: Run mypy type check
        run: mypy src/nyxora

      - name: Run tests
        run: pytest tests/ -x -q --timeout=60
